<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#D4AF37" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Inner Ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#D4AF37" stroke-width="1" stroke-dasharray="2, 2" opacity="0.5"/>
  
  <!-- Monogram Initials S & D -->
  <g transform="translate(1, 0)">
    <!-- Stylized Letter 'S' -->
    <path d="M 45 35 
             C 38 35, 36 43, 44 47 
             C 52 51, 54 59, 46 63 
             C 39 67, 36 60, 36 60" 
          fill="none" stroke="#D4AF37" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Stylized Letter 'D' -->
    <path d="M 54 36 
             L 54 62 
             C 54 62, 65 62, 65 49
             C 65 36, 54 36, 54 36 Z" 
          fill="none" stroke="#D4AF37" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Little Decorative Stars -->
  <polygon points="50,16 52,22 58,22 53,26 55,32 50,28 45,32 47,26 42,22 48,22" fill="#D4AF37"/>
</svg>
